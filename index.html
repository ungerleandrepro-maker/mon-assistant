<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e1416">
<title>Mon Assistant</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2312181a'/%3E%3Crect x='40' y='22' width='20' height='40' rx='10' fill='%233fae8f'/%3E%3Cpath d='M28 50a22 22 0 0 0 44 0' stroke='%233fae8f' stroke-width='6' fill='none' stroke-linecap='round'/%3E%3Cline x1='50' y1='72' x2='50' y2='84' stroke='%233fae8f' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">

<style>
  :root {
    --bg: #eef2f0;
    --ink: #16211d;
    --ink-soft: #55655c;
    --accent: #3f6f66;
    --accent-ink: #f1f4f1;
    --live: #c85a30;
    --danger: #b0432a;

    --blob-1: #3fae8f;
    --blob-2: #e8734a;
    --blob-3: #e0b34a;

    --glass-bg: rgba(255, 255, 255, 0.5);
    --glass-bg-strong: rgba(255, 255, 255, 0.68);
    --glass-border: rgba(255, 255, 255, 0.75);
    --glass-shine: rgba(255, 255, 255, 0.65);
    --glass-shadow: rgba(30, 50, 40, 0.16);

    --bubble-user-bg: rgba(47, 141, 114, 0.32);
    --bubble-user-border: rgba(47, 141, 114, 0.45);
    --bubble-assistant-bg: rgba(255, 255, 255, 0.55);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e1416;
      --ink: #eaf0ec;
      --ink-soft: #9fb0a7;
      --accent: #6ba396;
      --accent-ink: #06110d;
      --live: #ef8156;
      --danger: #ef8156;

      --glass-bg: rgba(24, 32, 34, 0.5);
      --glass-bg-strong: rgba(28, 38, 40, 0.65);
      --glass-border: rgba(255, 255, 255, 0.14);
      --glass-shine: rgba(255, 255, 255, 0.14);
      --glass-shadow: rgba(0, 0, 0, 0.45);

      --bubble-user-bg: rgba(79, 199, 159, 0.22);
      --bubble-user-border: rgba(79, 199, 159, 0.38);
      --bubble-assistant-bg: rgba(30, 40, 42, 0.55);
    }
  }

  :root[data-theme="dark"] {
    --bg: #0e1416;
    --ink: #eaf0ec;
    --ink-soft: #9fb0a7;
    --accent: #6ba396;
    --accent-ink: #06110d;
    --live: #ef8156;
    --danger: #ef8156;

    --glass-bg: rgba(24, 32, 34, 0.5);
    --glass-bg-strong: rgba(28, 38, 40, 0.65);
    --glass-border: rgba(255, 255, 255, 0.14);
    --glass-shine: rgba(255, 255, 255, 0.14);
    --glass-shadow: rgba(0, 0, 0, 0.45);

    --bubble-user-bg: rgba(79, 199, 159, 0.22);
    --bubble-user-border: rgba(79, 199, 159, 0.38);
    --bubble-assistant-bg: rgba(30, 40, 42, 0.55);
  }

  :root[data-theme="light"] {
    --bg: #eef2f0;
    --ink: #16211d;
    --ink-soft: #55655c;
    --accent: #3f6f66;
    --accent-ink: #f1f4f1;
    --live: #c85a30;
    --danger: #b0432a;

    --glass-bg: rgba(255, 255, 255, 0.5);
    --glass-bg-strong: rgba(255, 255, 255, 0.68);
    --glass-border: rgba(255, 255, 255, 0.75);
    --glass-shine: rgba(255, 255, 255, 0.65);
    --glass-shadow: rgba(30, 50, 40, 0.16);

    --bubble-user-bg: rgba(47, 141, 114, 0.32);
    --bubble-user-border: rgba(47, 141, 114, 0.45);
    --bubble-assistant-bg: rgba(255, 255, 255, 0.55);
  }

  * { box-sizing: border-box; }

  html {
    background: var(--bg);
  }
  html, body {
    margin: 0;
    height: 100%;
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow-x: hidden;
  }

  .mono {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Consolas, monospace;
  }

  .eyebrow {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Consolas, monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  button {
    font-family: inherit;
    -webkit-tap-highlight-color: rgba(88, 122, 158, 0.25);
  }
  button:focus-visible {
    outline: 2px solid rgba(88, 122, 158, 0.6);
    outline-offset: 2px;
  }
  button:focus:not(:focus-visible) {
    outline: none;
  }

  .backdrop {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    background: var(--bg);
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.55;
    will-change: transform;
  }
  .blob.b1 {
    width: 60vmax; height: 60vmax;
    top: -20vmax; left: -18vmax;
    background: var(--blob-1);
    animation: drift1 26s ease-in-out infinite;
  }
  .blob.b2 {
    width: 52vmax; height: 52vmax;
    bottom: -22vmax; right: -16vmax;
    background: var(--blob-2);
    animation: drift2 32s ease-in-out infinite;
  }
  .blob.b3 {
    width: 40vmax; height: 40vmax;
    bottom: 8vmax; left: -10vmax;
    background: var(--blob-3);
    opacity: 0.35;
    animation: drift3 22s ease-in-out infinite;
  }
  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(6vmax, 8vmax) scale(1.08); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-7vmax, -5vmax) scale(1.1); }
  }
  @keyframes drift3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(5vmax, -6vmax) scale(1.05); }
  }

  #screen {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .glass {
    position: relative;
    background: var(--glass-bg);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--glass-border);
    box-shadow: 0 1px 1px var(--glass-shine) inset, 0 8px 32px var(--glass-shadow);
  }
  .glass::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, var(--glass-shine), transparent 45%);
    opacity: 0.6;
    pointer-events: none;
  }

  #onboarding {
    width: 100%;
    max-width: 380px;
    margin: auto;
    padding: 32px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: rise 0.6s cubic-bezier(.2,.8,.2,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card {
    border-radius: 26px;
    padding: 26px 22px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .badge {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent); color: var(--accent-ink);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto;
    box-shadow: 0 1px 1px rgba(255,255,255,0.5) inset, 0 6px 18px rgba(0,0,0,0.18);
  }

  h1 {
    font-size: 21px;
    font-weight: 650;
    margin: 0;
    text-wrap: balance;
    text-align: center;
  }

  .lede {
    color: var(--ink-soft);
    font-size: 14px;
    line-height: 1.5;
    text-align: center;
    margin: 0;
  }

  label {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .label-text {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Consolas, monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  input[type="text"], input[type="tel"] {
    font: inherit;
    font-size: 16px;
    padding: 12px 14px;
    border-radius: 14px;
    border: 1px solid var(--glass-border);
    background: rgba(255, 255, 255, 0.28);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    color: var(--ink);
    width: 100%;
  }
  input[type="text"]::placeholder, input[type="tel"]::placeholder { color: var(--ink-soft); opacity: 0.8; }
  input[type="text"]:focus, input[type="tel"]:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  button.primary {
    position: relative;
    overflow: hidden;
    background: var(--accent);
    color: var(--accent-ink);
    border: none;
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 1px 1px rgba(255,255,255,0.5) inset, 0 6px 16px rgba(0,0,0,0.16);
  }
  button.primary:active { transform: scale(0.98); }

  .field-error {
    color: var(--danger);
    font-size: 13px;
    display: none;
  }

  #app {
    display: none;
    width: 100%;
    max-width: 460px;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
    margin: 0 auto;
  }

  .topbar {
    margin: 10px 12px 8px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    gap: 12px;
  }

  .who { display: flex; flex-direction: column; gap: 2px; }
  .who .name { font-weight: 650; font-size: 16px; }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Consolas, monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .status-pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  button.link {
    background: none; border: none; color: var(--ink-soft);
    font-size: 13px; text-decoration: underline; cursor: pointer; padding: 4px;
  }

  #log {
    flex: 1;
    padding: 8px 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
  }

  .empty-hint {
    margin: auto;
    text-align: center;
    color: var(--ink-soft);
    font-size: 13.5px;
    max-width: 240px;
    line-height: 1.5;
  }

  .msg {
    position: relative;
    overflow: hidden;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.45;
    max-width: 82%;
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    backdrop-filter: blur(16px) saturate(160%);
    border: 1px solid var(--glass-border);
    box-shadow: 0 1px 1px var(--glass-shine) inset, 0 4px 14px var(--glass-shadow);
    animation: pop 0.25s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(8px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg.user {
    align-self: flex-end;
    background: var(--bubble-user-bg);
    border-color: var(--bubble-user-border);
    color: var(--ink);
    border-bottom-right-radius: 6px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--bubble-assistant-bg);
    color: var(--ink);
    border-bottom-left-radius: 6px;
  }

  .console {
    margin: 8px 12px calc(14px + env(safe-area-inset-bottom, 0px));
    border-radius: 28px;
    padding: 16px 16px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .status-line {
    min-height: 16px;
    font-size: 13px;
    color: var(--ink-soft);
    text-align: center;
  }
  .status-line.err { color: var(--danger); }

  .mic-wrap { position: relative; width: 108px; height: 108px; }

  #waveCanvas {
    position: absolute; inset: 0;
    width: 108px; height: 108px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  #waveCanvas.active { opacity: 1; }

  #micBtn {
    position: absolute;
    top: 12px; left: 12px;
    width: 84px; height: 84px;
    border-radius: 50%;
    border: 1px solid var(--glass-border);
    cursor: pointer;
    background: linear-gradient(160deg, color-mix(in srgb, var(--accent) 85%, white 15%), var(--accent));
    color: var(--accent-ink);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 2px rgba(255,255,255,0.55) inset, 0 10px 26px var(--glass-shadow);
    transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  }
  #micBtn:active { transform: scale(0.96); }
  #micBtn.listening {
    background: linear-gradient(160deg, color-mix(in srgb, var(--live) 85%, white 15%), var(--live));
  }
  #micBtn[disabled] { opacity: 0.4; cursor: default; }

  #textForm {
    width: 100%;
    display: flex;
    gap: 8px;
  }
  #textInput {
    flex: 1;
    font-size: 16px;
    padding: 12px 14px;
    border-radius: 14px;
    border: 1px solid var(--glass-border);
    background: rgba(255, 255, 255, 0.28);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    color: var(--ink);
  }
  #textInput::placeholder { color: var(--ink-soft); opacity: 0.8; }
  #textInput:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  #textForm button.primary { flex-shrink: 0; padding: 12px 18px; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    .blob { animation: none !important; }
  }
</style>
</head>
<body>
<div class="backdrop" aria-hidden="true">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div id="screen">
  <div id="onboarding">
    <div class="card glass">
      <div class="badge" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor"/>
          <path d="M6 11a6 6 0 0 0 12 0" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          <line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Mon Assistant</h1>
      <p class="lede">Pour commencer, dis-nous qui tu es. Un administrateur doit t'avoir autorisé au préalable.</p>
      <label>
        <span class="label-text">Prénom</span>
        <input id="obName" type="text" placeholder="Pablo" autocomplete="given-name">
      </label>
      <label>
        <span class="label-text">Numéro de téléphone</span>
        <input id="obPhone" type="tel" placeholder="+33612345678" autocomplete="tel">
      </label>
      <button id="obSubmit" class="primary">Commencer</button>
      <p id="obError" class="field-error"></p>
    </div>
  </div>

  <div id="app">
    <div class="topbar glass">
      <div class="who">
        <span class="eyebrow">Mon Assistant</span>
        <span class="name" id="greeting">—</span>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <span class="status-pill"><span class="dot"></span><span id="connState">en ligne</span></span>
        <button id="switchUser" class="link">Changer</button>
      </div>
    </div>

    <div id="log">
      <p class="empty-hint" id="emptyHint">Touche le micro et parle, ou écris ton message ci-dessous. Je peux gérer l'agenda partagé, tes contacts, tes emails et tes messages.</p>
    </div>

    <div class="console glass">
      <div class="status-line" id="status">Prêt</div>
      <div class="mic-wrap">
        <canvas id="waveCanvas" width="216" height="216"></canvas>
        <button id="micBtn" aria-label="Parler">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor"/>
            <path d="M6 11a6 6 0 0 0 12 0" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
            <line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <form id="textForm">
        <input id="textInput" type="text" placeholder="Écris ton message…" autocomplete="off">
        <button type="submit" class="primary">Envoyer</button>
      </form>
    </div>
  </div>
</div>

<script>
(function () {
  var API_BASE = 'https://n8n-z4ua.srv1822006.hstgr.cloud/webhook/assistant-app';
  var USER_KEY = 'assistant_user';

  function getUser() {
    try { return JSON.parse(localStorage.getItem(USER_KEY) || 'null'); } catch (e) { return null; }
  }
  function setUser(u) {
    try { localStorage.setItem(USER_KEY, JSON.stringify(u)); } catch (e) {}
  }

  var onboardingEl = document.getElementById('onboarding');
  var appEl = document.getElementById('app');
  var user = getUser();

  function showApp() {
    onboardingEl.style.display = 'none';
    appEl.style.display = 'flex';
    document.getElementById('greeting').textContent = user.name;
    initApp();
  }

  document.getElementById('obSubmit').addEventListener('click', function () {
    try {
      var name = document.getElementById('obName').value.trim();
      var phone = document.getElementById('obPhone').value.trim();
      var errEl = document.getElementById('obError');
      if (!name || !phone) {
        errEl.textContent = 'Merci de renseigner ton prénom et ton numéro.';
        errEl.style.display = 'block';
        return;
      }
      user = { name: name, phone: phone };
      setUser(user);
      showApp();
    } catch (err) {
      var errEl2 = document.getElementById('obError');
      errEl2.textContent = 'Erreur inattendue : ' + (err && err.message ? err.message : String(err));
      errEl2.style.display = 'block';
    }
  });

  document.getElementById('switchUser').addEventListener('click', function () {
    try { localStorage.removeItem(USER_KEY); } catch (e) {}
    location.reload();
  });

  if (user && user.name && user.phone) {
    showApp();
  }

  function initApp() {
    var micBtn = document.getElementById('micBtn');
    var statusEl = document.getElementById('status');
    var logEl = document.getElementById('log');
    var emptyHint = document.getElementById('emptyHint');
    var textForm = document.getElementById('textForm');
    var textInput = document.getElementById('textInput');
    var canvas = document.getElementById('waveCanvas');
    var ctx = canvas.getContext('2d');
    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function appendMessage(who, text) {
      if (emptyHint) { emptyHint.remove(); emptyHint = null; }
      var div = document.createElement('div');
      div.className = 'msg ' + who;
      div.textContent = text;
      logEl.appendChild(div);
      div.scrollIntoView({ behavior: reduceMotion ? 'auto' : 'smooth', block: 'end' });
    }

    function setStatus(text, isError) {
      statusEl.textContent = text;
      statusEl.classList.toggle('err', !!isError);
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      var utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'fr-FR';
      speechSynthesis.cancel();
      speechSynthesis.speak(utter);
    }

    async function sendToAssistant(text) {
      if (!text || !text.trim()) return;
      setStatus('Réflexion…');
      try {
        var res = await fetch(API_BASE + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, name: user.name, phone: user.phone })
        });
        var data = await res.json();
        var reply = (data && data.reply) ? data.reply : "Désolé, je n'ai pas pu répondre.";
        appendMessage('assistant', reply);
        speak(reply);
        setStatus('Prêt');
      } catch (err) {
        setStatus("Erreur de connexion à l'assistant", true);
      }
    }

    textForm.addEventListener('submit', function (e) {
      e.preventDefault();
      var text = textInput.value;
      if (!text.trim()) return;
      textInput.value = '';
      appendMessage('user', text);
      sendToAssistant(text);
    });

    var waveRAF = null;
    var waveStart = 0;
    function drawWave(ts) {
      if (!waveStart) waveStart = ts;
      var t = (ts - waveStart) / 1000;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      var cx = canvas.width / 2, cy = canvas.height / 2;
      var bars = 28;
      var accent = getComputedStyle(document.documentElement).getPropertyValue('--live').trim() || '#e8734a';
      ctx.strokeStyle = accent;
      ctx.lineCap = 'round';
      for (var i = 0; i < bars; i++) {
        var angle = (i / bars) * Math.PI * 2;
        var amp = reduceMotion ? 6 : (6 + 10 * Math.abs(Math.sin(t * 3 + i * 0.6)));
        var r1 = 78;
        var r2 = r1 + amp;
        ctx.globalAlpha = 0.35 + 0.5 * Math.abs(Math.sin(t * 3 + i * 0.6));
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(angle) * r1, cy + Math.sin(angle) * r1);
        ctx.lineTo(cx + Math.cos(angle) * r2, cy + Math.sin(angle) * r2);
        ctx.stroke();
      }
      waveRAF = requestAnimationFrame(drawWave);
    }
    function startWave() {
      canvas.classList.add('active');
      waveStart = 0;
      if (!reduceMotion) {
        waveRAF = requestAnimationFrame(drawWave);
      } else {
        drawWave(0);
      }
    }
    function stopWave() {
      canvas.classList.remove('active');
      if (waveRAF) cancelAnimationFrame(waveRAF);
      waveRAF = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    var MediaRecorderImpl = window.MediaRecorder;
    if (!MediaRecorderImpl || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      micBtn.disabled = true;
      setStatus('Micro non supporté ici — écris ton message ci-dessous');
    } else {
      var isRecording = false;
      var mediaRecorder = null;
      var audioChunks = [];
      var activeStream = null;

      function pickMimeType() {
        var candidates = ['audio/webm', 'audio/mp4', 'audio/ogg'];
        for (var i = 0; i < candidates.length; i++) {
          if (MediaRecorderImpl.isTypeSupported && MediaRecorderImpl.isTypeSupported(candidates[i])) {
            return candidates[i];
          }
        }
        return '';
      }

      function extensionFor(mimeType) {
        if (mimeType.indexOf('mp4') !== -1) return 'm4a';
        if (mimeType.indexOf('ogg') !== -1) return 'ogg';
        return 'webm';
      }

      function stopStreamTracks() {
        if (activeStream) {
          activeStream.getTracks().forEach(function (t) { t.stop(); });
          activeStream = null;
        }
      }

      async function transcribeAndSend(blob, mimeType) {
        setStatus('Transcription…');
        try {
          var formData = new FormData();
          formData.append('data', blob, 'audio.' + extensionFor(mimeType));
          formData.append('phone', user.phone);
          var res = await fetch(API_BASE + '/transcribe', {
            method: 'POST',
            body: formData
          });
          var data = await res.json();
          var text = data && data.text ? data.text.trim() : '';
          if (text) {
            appendMessage('user', text);
            sendToAssistant(text);
          } else {
            setStatus("Je n'ai rien entendu, réessaie ou écris ton message.", true);
          }
        } catch (err) {
          setStatus('Erreur de transcription, réessaie ou écris ton message.', true);
        }
      }

      function startRecording() {
        setStatus('Demande du micro…');
        navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
          activeStream = stream;
          var mimeType = pickMimeType();
          try {
            mediaRecorder = mimeType ? new MediaRecorderImpl(stream, { mimeType: mimeType }) : new MediaRecorderImpl(stream);
          } catch (e) {
            setStatus('Micro indisponible, réessaie ou écris ton message.', true);
            stopStreamTracks();
            return;
          }
          audioChunks = [];
          mediaRecorder.addEventListener('dataavailable', function (e) {
            if (e.data && e.data.size > 0) audioChunks.push(e.data);
          });
          mediaRecorder.addEventListener('stop', function () {
            stopStreamTracks();
            micBtn.classList.remove('listening');
            stopWave();
            isRecording = false;
            if (audioChunks.length) {
              var blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || mimeType || 'audio/webm' });
              transcribeAndSend(blob, blob.type);
            } else {
              setStatus('Prêt');
            }
          });
          mediaRecorder.start();
          isRecording = true;
          micBtn.classList.add('listening');
          startWave();
          setStatus('Écoute… touche à nouveau quand tu as fini');
        }).catch(function () {
          setStatus('Micro refusé : autorise le micro pour ce site, ou écris ton message.', true);
        });
      }

      micBtn.addEventListener('click', function () {
        if (isRecording) {
          mediaRecorder.stop();
          return;
        }
        startRecording();
      });
    }
  }
})();
</script>
</body>
</html>
